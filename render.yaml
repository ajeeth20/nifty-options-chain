services:
  - type: web
    name: nifty-options-chain
    env: python
    plan: free
    region: singapore
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
```

5. Click **Commit changes**

